{% extends 'leaves/base.html' %}

{% block content %}
<div class="card form-container">
    <h2 class="text-center mb-6 font-bold"
        style="font-size: 1.5rem; background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">
        Record New Leave
    </h2>

    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="start_date">Start Date</label>
            <input type="date" id="start_date" name="start_date" required onclick="this.showPicker()">
        </div>
        <div class="form-group">
            <label for="end_date">End Date</label>
            <input type="date" id="end_date" name="end_date" required onclick="this.showPicker()">
        </div>
        <div class="form-group">
            <label for="status">Status</label>
            <select id="status" name="status">
                <option value="TAKEN">Taken</option>
                <option value="PLANNED">Planned/Advance</option>
            </select>
        </div>
        <div class="form-group">
            <label for="remarks">Remarks</label>
            <textarea id="remarks" name="remarks" rows="3" placeholder="Optional notes..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary w-full mt-4">Save Leave</button>
        <div class="mt-4">
            <a href="{% url 'dashboard' %}" class="btn btn-secondary w-full">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
