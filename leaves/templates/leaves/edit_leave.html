{% extends 'leaves/base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto py-6">
    <div class="card relative overflow-hidden">
        <!-- Accent bar -->
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-orange-500 via-amber-500 to-yellow-500"></div>
        
        <div class="mb-10 text-center">
            <h2 class="text-3xl font-black text-slate-100 italic tracking-tight mb-2 uppercase">Edit Leave</h2>
            <p class="text-muted font-medium text-sm">Update the details of your previous leave record</p>
        </div>

        <form method="POST" class="space-y-8">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-3">
                    <label for="start_date" class="form-label px-1">Start Date</label>
                    <input type="date" id="start_date" name="start_date" value="{{ leave.start_date|date:'Y-m-d' }}" required onclick="this.showPicker()"
                           class="form-input">
                </div>
                <div class="space-y-3">
                    <label for="end_date" class="form-label px-1">End Date</label>
                    <input type="date" id="end_date" name="end_date" value="{{ leave.end_date|date:'Y-m-d' }}" required onclick="this.showPicker()"
                           class="form-input">
                </div>
            </div>

            <div class="space-y-3">
                <label for="status" class="form-label px-1">Leave Status</label>
                <div class="relative">
                    <select id="status" name="status" 
                            class="form-input">
                        <option value="TAKEN" {% if leave.status == 'TAKEN' %}selected{% endif %} class="bg-slate-900">Taken</option>
                        <option value="PLANNED" {% if leave.status == 'PLANNED' %}selected{% endif %} class="bg-slate-900">Planned / Advance</option>
                    </select>
                    <div class="absolute inset-y-0 right-5 flex items-center pointer-events-none">
                        <svg class="w-4 h-4 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                </div>
            </div>

            <div class="space-y-3">
                <label for="remarks" class="form-label px-1">Remarks (Optional)</label>
                <textarea id="remarks" name="remarks" rows="3"
                          class="form-input h-auto resize-none">{{ leave.remarks }}</textarea>
            </div>

            <div class="pt-4 flex flex-col gap-4">
                <button type="submit" class="btn btn-primary w-full py-4 font-black uppercase tracking-widest italic shadow-amber-500/10 hover:shadow-amber-500/20">Update Leave Record</button>
                <a href="{% url 'dashboard' %}" class="btn btn-secondary w-full py-4 font-bold">Discard Changes</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
