{% extends 'leaves/base.html' %}

{% block content %}
<div class="card form-container">
    <h2 class="text-center mb-6 font-bold"
        style="font-size: 1.5rem; background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">
        Edit Leave
    </h2>

    <form method="POST">
        {% csrf_token %}
        <div class="form-row">
            <div class="form-group">
                <label for="start_date">Start Date</label>
                <input type="date" id="start_date" name="start_date" value="{{ leave.start_date|date:'Y-m-d' }}" required onclick="this.showPicker()">
            </div>
            <div class="form-group">
                <label for="end_date">End Date</label>
                <input type="date" id="end_date" name="end_date" value="{{ leave.end_date|date:'Y-m-d' }}" required onclick="this.showPicker()">
            </div>
        </div>
        <div class="form-group">
            <label for="status">Status</label>
            <select id="status" name="status">
                <option value="TAKEN" {% if leave.status == 'TAKEN' %}selected{% endif %}>Taken</option>
                <option value="PLANNED" {% if leave.status == 'PLANNED' %}selected{% endif %}>Planned/Advance</option>
            </select>
        </div>
        <div class="form-group">
            <label for="remarks">Remarks</label>
            <textarea id="remarks" name="remarks" rows="3">{{ leave.remarks }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary w-full mt-4">Update Leave</button>
        <div class="mt-4">
            <a href="{% url 'dashboard' %}" class="btn btn-secondary w-full">Go Back</a>
        </div>
    </form>
</div>
{% endblock %}
