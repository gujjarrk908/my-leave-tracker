{% extends 'leaves/base.html' %}

{% block title %}Log Office Login - Leave Tracker{% endblock %}

{% block content %}
<div class="max-w-md mx-auto py-10">
    <div class="card relative overflow-hidden group">
        <!-- Floating gradient glow -->
        <div class="absolute -top-16 -left-16 w-32 h-32 bg-indigo-500/20 blur-[60px] rounded-full group-hover:bg-indigo-500/30 transition-all duration-700"></div>
        
        <div class="relative text-center mb-10">
            <h2 class="text-3xl font-black text-slate-50 tracking-tight mb-2">Office Login</h2>
            <p class="text-muted font-medium text-sm">Log your arrival time for presence tracking</p>
        </div>

        <form method="POST" class="space-y-8 relative">
            {% csrf_token %}
            
            <div class="space-y-2">
                <label for="date" class="text-[10px] font-black uppercase tracking-[0.25em] text-slate-500 ml-1">Selection Date</label>
                <div class="relative">
                    <input type="date" name="date" id="date" required onclick="this.showPicker()"
                           value="{{ target_date|date:'Y-m-d' }}"
                           class="w-full bg-slate-900 border border-border text-slate-100 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all font-bold">
                </div>
            </div>
            
            <div class="space-y-2">
                <div class="flex justify-between items-center ml-1">
                    <label for="login_time" class="text-[10px] font-black uppercase tracking-[0.25em] text-slate-500">Arrival Time (24h)</label>
                    <span class="text-[10px] font-bold text-indigo-400/80 tracking-widest uppercase bg-indigo-500/5 px-2 py-0.5 rounded-md border border-indigo-500/10">HH:MM</span>
                </div>
                <div class="relative">
                    <input type="time" name="login_time" id="login_time" required onclick="this.showPicker()"
                           value="{% if login_entry %}{{ login_entry.login_time|time:'H:i' }}{% endif %}"
                           class="w-full bg-slate-900 border border-border text-slate-100 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all font-mono font-bold text-lg">
                </div>
            </div>

            <div class="pt-6 space-y-4">
                <button type="submit" class="btn btn-primary w-full py-4.5 text-base font-black uppercase tracking-widest shadow-xl shadow-indigo-500/10">
                    {% if login_entry %}Update Record{% else %}Confirm Presence{% endif %}
                </button>

                <a href="{% url 'dashboard' %}" class="btn btn-secondary w-full py-4 font-bold text-sm tracking-wide">
                    Return to Dashboard
                </a>
            </div>
        </form>
    </div>
    
    <div class="mt-8 flex justify-center gap-6 opacity-30">
        <div class="w-1.5 h-1.5 rounded-full bg-slate-600"></div>
        <div class="w-1.5 h-1.5 rounded-full bg-slate-600"></div>
        <div class="w-1.5 h-1.5 rounded-full bg-slate-600"></div>
    </div>
</div>
{% endblock %}
