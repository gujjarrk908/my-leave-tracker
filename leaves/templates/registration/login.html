{% extends 'leaves/base.html' %}

{% block content %}
<div class="form-container" style="margin-top: 60px;">
    <div class="card">
        <h2 class="text-center" style="margin-top: 0; margin-bottom: 24px;">Login to Leave Tracker</h2>
        
        {% if form.errors %}
        <div class="alert alert-error">
            Your username and password didn't match. Please try again.
        </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" required>
            </div>
            
            <button type="submit" class="btn btn-primary w-full mt-4">Login</button>
            <input type="hidden" name="next" value="{{ next|default:'.' }}" />
        </form>
    </div>
</div>
{% endblock %}
